spring.application.name=agent

# MCP
mcp.base-url=${MCP_BASE_URL:http://localhost:3333}
mcp.path=${MCP_PATH:/mcp}

# Gemini
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.timeout-seconds=${GEMINI_TIMEOUT:60}

# GitHub
github.owner=${GITHUB_OWNER:default-owner}
github.repo=${GITHUB_REPO:default-repo}

# Actuator
management.endpoints.web.exposure.include=health,info
